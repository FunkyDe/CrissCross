<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Player</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <span id="server-status">● Connecting…</span>

    <div id="player">
      <div id="track-info">
        <div id="track-name">No track loaded</div>
        <div id="track-meta"></div>
      </div>

      <audio id="audio" preload="auto"></audio>

      <div id="seek-row">
        <label for="seek" id="seek-label">0:00 / 0:00</label>
        <input type="range" id="seek" min="0" max="1" step="0.1" value="0" />
      </div>

      <div id="controls">
        <button id="btn-play" disabled>Play</button>
        <button id="btn-next" disabled>Next ›</button>
      </div>

      <div id="volume-row">
        <label for="volume">Vol</label>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="1" />
        <span id="volume-label">100%</span>
      </div>

      <div id="message">Waiting for server…</div>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
