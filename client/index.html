<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Player</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <span id="server-status">● Connecting…</span>

    <div id="player">
      <div id="track-info">
        <div id="track-name">No track loaded</div>
        <div id="track-meta"></div>
      </div>

      <audio id="audio" preload="auto"></audio>

      <div id="seek-row">
        <input type="range" id="seek" min="0" max="1" step="0.1" value="0" />
      </div>

      <div id="controls">
        <label id="seek-label">0:00 / 0:00</label>
        <button id="btn-play" disabled>Play</button>
        <button id="btn-next" disabled>Next ›</button>
      </div>

      <div id="volume-row">
        <button id="btn-mute">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24"
            viewBox="0 0 24 24"
            width="24"
            focusable="false"
            aria-hidden="true"
            id="mute"
          >
            <path
              id="mute-icon"
              d="M11.485 2.143 3.913 6.687A6 6 0 001 11.832v.338a6 6 0 002.913 5.144l7.572 4.543A1 1 0 0013 21V3a1.001 1.001 0 00-1.515-.857Zm6.88 2.079a1 1 0 00-.001 1.414 9 9 0 010 12.728 1 1 0 001.414 1.414 11 11 0 000-15.556 1 1 0 00-1.413 0ZM4.941 8.402l.001-.002L11 4.767v14.466l-6.058-3.635A4 4 0 013 12.168v-.337a4 4 0 011.941-3.429ZM15.535 7.05a1 1 0 000 1.415 5 5 0 010 7.07 1 1 0 001.415 1.415 6.999 6.999 0 000-9.9 1 1 0 00-1.415 0Z"
            ></path>
            <path
              id="mute-icon-muted"
              class="hidden"
              d="M11.485 2.143 3.913 6.687A6 6 0 001 11.832v.338a6 6 0 002.913 5.144l7.572 4.543A1 1 0 0013 21V3a1.001 1.001 0 00-1.515-.857ZM4.942 8.4 11 4.767v14.466l-6.058-3.634A4 4 0 013 12.169v-.338A4 4 0 014.942 8.4Zm16.351-.108L19 10.586l-2.293-2.293a1 1 0 10-1.414 1.414L17.586 12l-2.293 2.293a1 1 0 101.414 1.414L19 13.414l2.293 2.293a1 1 0 101.414-1.414L20.414 12l2.293-2.294a1 1 0 10-1.414-1.414Z"
            ></path>
          </svg>
        </button>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="1" />
        <span id="volume-label">100%</span>
      </div>

      <div id="message">Waiting for server…</div>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
