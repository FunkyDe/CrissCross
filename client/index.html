<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Player</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 1.5rem;
        padding: 2rem;
      }

      #server-status {
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        padding: 0.25rem 0.75rem;
        border-radius: 999px;
        background: #1e3a1e;
        color: #6fcf6f;
        transition:
          background 0.3s,
          color 0.3s;
      }
      #server-status.disconnected {
        background: #3a1e1e;
        color: #cf6f6f;
      }

      #player {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 1rem;
        padding: 2rem;
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      #track-info {
        text-align: center;
        min-height: 3rem;
      }
      #track-name {
        font-size: 1rem;
        font-weight: 600;
        word-break: break-word;
        color: #fff;
      }
      #track-meta {
        font-size: 0.75rem;
        color: #666;
        margin-top: 0.35rem;
      }

      #controls {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
      }

      button {
        background: #2a2a2a;
        color: #eee;
        border: 1px solid #333;
        border-radius: 0.5rem;
        padding: 0.6rem 1.4rem;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover {
        background: #333;
      }
      button:disabled {
        opacity: 0.35;
        cursor: default;
      }
      button#btn-play {
        min-width: 90px;
      }

      #volume-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.8rem;
        color: #888;
      }
      #volume {
        flex: 1;
        accent-color: #6fcf6f;
        cursor: pointer;
      }

      #message {
        font-size: 0.78rem;
        color: #888;
        text-align: center;
        min-height: 1rem;
      }
    </style>
  </head>
  <body>
    <span id="server-status">● Connecting…</span>

    <div id="player">
      <div id="track-info">
        <div id="track-name">No track loaded</div>
        <div id="track-meta"></div>
      </div>

      <audio id="audio" preload="auto"></audio>

      <div id="controls">
        <button id="btn-play" disabled>Play</button>
        <button id="btn-next" disabled>Next ›</button>
      </div>

      <div id="volume-row">
        <label for="volume">Vol</label>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="1" />
        <span id="volume-label">100%</span>
      </div>

      <div id="message">Waiting for server…</div>
    </div>

    <script>
      // -----------------------------------------------------------------------
      // Elements
      // -----------------------------------------------------------------------
      const audio = document.getElementById("audio");
      const btnPlay = document.getElementById("btn-play");
      const btnNext = document.getElementById("btn-next");
      const volumeSlider = document.getElementById("volume");
      const volumeLabel = document.getElementById("volume-label");
      const trackName = document.getElementById("track-name");
      const trackMeta = document.getElementById("track-meta");
      const message = document.getElementById("message");
      const statusBadge = document.getElementById("server-status");

      // -----------------------------------------------------------------------
      // State
      // -----------------------------------------------------------------------
      let serverAlive = false;
      let trackLoaded = false;

      // -----------------------------------------------------------------------
      // API helpers
      // -----------------------------------------------------------------------
      async function apiFetch(path, options = {}) {
        const res = await fetch(path, options);
        if (!res.ok) {
          const err = await res
            .json()
            .catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || res.statusText);
        }
        return res.json();
      }

      // -----------------------------------------------------------------------
      // Server health — poll every 5 s
      // -----------------------------------------------------------------------
      async function checkHealth() {
        try {
          await apiFetch("/health");
          if (!serverAlive) {
            serverAlive = true;
            statusBadge.textContent = "● Connected";
            statusBadge.classList.remove("disconnected");
            // First successful connection — load the current track
            if (!trackLoaded) await loadCurrent();
          }
        } catch {
          serverAlive = false;
          statusBadge.textContent = "● Disconnected";
          statusBadge.classList.add("disconnected");
          setMessage("Cannot reach server. Is it running?");
          setControlsEnabled(false);
        }
      }

      setInterval(checkHealth, 5000);
      checkHealth(); // run immediately

      // -----------------------------------------------------------------------
      // Track loading
      // -----------------------------------------------------------------------

      /** Load whatever track current_index points to (no side-effects on server). */
      async function loadCurrent() {
        try {
          const track = await apiFetch("/api/current");
          setTrack(track);
        } catch (e) {
          setMessage(`Could not load track: ${e.message}`);
        }
      }

      /** Ask the server to advance the queue and return the next track. */
      async function loadNext() {
        try {
          const track = await apiFetch("/api/next", { method: "POST" });
          setTrack(track);
          // Auto-play when the user explicitly clicks Next
          audio.play();
        } catch (e) {
          setMessage(`Could not advance queue: ${e.message}`);
        }
      }

      function setTrack(track) {
        // Setting src resets the element; the browser will issue a Range-aware
        // request when play() is called.
        audio.src = `/api/tracks/${encodeURIComponent(track.filename)}`;
        trackName.textContent = track.filename;
        trackMeta.textContent = `Track ${track.index + 1} of ${track.total}`;
        trackLoaded = true;
        setControlsEnabled(true);
        setMessage("Ready");
      }

      // -----------------------------------------------------------------------
      // Controls
      // -----------------------------------------------------------------------

      function setControlsEnabled(enabled) {
        btnPlay.disabled = !enabled;
        btnNext.disabled = !enabled;
      }

      btnPlay.addEventListener("click", () => {
        if (audio.paused) {
          audio.play();
        } else {
          audio.pause();
        }
      });

      btnNext.addEventListener("click", loadNext);

      // Auto-advance when a track finishes
      audio.addEventListener("ended", loadNext);

      // Keep play button label in sync with actual playback state
      audio.addEventListener("play", () => {
        btnPlay.textContent = "Pause";
      });
      audio.addEventListener("pause", () => {
        btnPlay.textContent = "Play";
      });

      audio.addEventListener("error", () => {
        setMessage(`Playback error — check that the file format is supported.`);
      });

      // -----------------------------------------------------------------------
      // Volume — persisted to settings.json via the server
      // -----------------------------------------------------------------------
      async function initVolume() {
        try {
          const settings = await apiFetch("/api/settings");
          const vol = settings.volume ?? 1;
          audio.volume = vol;
          volumeSlider.value = vol;
          volumeLabel.textContent = `${Math.round(vol * 100)}%`;
        } catch {
          /* non-fatal; default volume is fine */
        }
      }

      volumeSlider.addEventListener("input", () => {
        const vol = parseFloat(volumeSlider.value);
        audio.volume = vol;
        volumeLabel.textContent = `${Math.round(vol * 100)}%`;
      });

      // Debounce the settings write — no need to hit the server on every px of drag
      let volumeSaveTimer;
      volumeSlider.addEventListener("change", () => {
        clearTimeout(volumeSaveTimer);
        volumeSaveTimer = setTimeout(() => {
          apiFetch("/api/settings", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ volume: parseFloat(volumeSlider.value) }),
          }).catch(() => {}); // non-fatal
        }, 300);
      });

      // -----------------------------------------------------------------------
      // Helpers
      // -----------------------------------------------------------------------
      function setMessage(text) {
        message.textContent = text;
      }

      // -----------------------------------------------------------------------
      // Init
      // -----------------------------------------------------------------------
      initVolume();
    </script>
  </body>
</html>
